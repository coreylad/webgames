<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hex Avoid | webgames.lol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header>
        <h1>Hex Avoid</h1>
        <p>Arrow keys or WASD to move. Survive hunter waves and collect blue cells for bonus points.</p>
        <a class="back-link" href="/">← Back to webgames.lol</a>
      </header>

      <section class="panel">
        <p id="hxInfo">Score: 0 | Time: 0s | Lives: 3</p>
        <div class="canvas-wrap">
          <canvas id="hxCanvas" width="720" height="420" aria-label="Hex Avoid game"></canvas>
        </div>
        <div class="controls">
          <button id="hxRestart">Restart</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Leaderboard</h2>
          <p>Longest and highest survival runs.</p>
        </div>
        <p id="lbStatus" class="status">Loading leaderboard...</p>
        <ol id="lbList" class="leaderboard-list"></ol>
      </section>
    </main>

    <script src="progression.js"></script>
    <script src="leaderboard.js"></script>
    <script>
      const canvas = document.getElementById("hxCanvas");
      const ctx = canvas.getContext("2d");
      const info = document.getElementById("hxInfo");
      const restartButton = document.getElementById("hxRestart");
      const leaderboard = createLeaderboardController({ game: "hexavoid", listId: "lbList", statusId: "lbStatus" });
      const progression = createProgressionCurve({ start: 1, end: 2.4, warmup: 120, duration: 3200 });

      const cfg = {
        startingLives: 3,
        cellSpawnInterval: 90,
        botSpawnInterval: 580,
        playerSpeed: 3.2
      };

      let player;
      let bots;
      let cells;
      let keys;
      let ticks;
      let score;
      let lives;
      let over;

      function reset() {
        player = { x: 180, y: 210, r: 10, speed: cfg.playerSpeed };
        bots = [
          { x: 620, y: 90, vx: -1.8, vy: 1.4, r: 11 },
          { x: 590, y: 320, vx: -1.6, vy: -1.5, r: 11 }
        ];
        cells = [];
        keys = { up: false, down: false, left: false, right: false };
        ticks = 0;
        score = 0;
        lives = Math.max(1, Math.floor(cfg.startingLives));
        over = false;
        leaderboard.resetRound();
      }

      function spawnCell() {
        cells.push({ x: 40 + Math.random() * 640, y: 40 + Math.random() * 340, r: 6 });
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function damage() {
        lives -= 1;
        player.x = 180;
        player.y = 210;
        if (lives <= 0) {
          over = true;
          leaderboard.submit(score);
        }
      }

      function update() {
        if (over) {
          return;
        }

        ticks += 1;
        const curve = progression.at(ticks);
        const cellInterval = Math.max(16, Math.floor(cfg.cellSpawnInterval - (curve - 1) * 16));
        const botInterval = Math.max(96, Math.floor(cfg.botSpawnInterval - (curve - 1) * 180));
        if (ticks % cellInterval === 0 && cells.length < 5) {
          spawnCell();
        }

        if (ticks % botInterval === 0 && bots.length < 6) {
          bots.push({
            x: 650 + Math.random() * 40,
            y: 30 + Math.random() * 360,
            vx: -1.6 - Math.random() * 1.8,
            vy: (Math.random() - 0.5) * 3,
            r: 10 + Math.random() * 2
          });
        }

        if (keys.up) player.y -= player.speed;
        if (keys.down) player.y += player.speed;
        if (keys.left) player.x -= player.speed;
        if (keys.right) player.x += player.speed;

        player.x = clamp(player.x, player.r, canvas.width - player.r);
        player.y = clamp(player.y, player.r, canvas.height - player.r);

        bots.forEach((bot) => {
          const dx = player.x - bot.x;
          const dy = player.y - bot.y;
          const len = Math.max(1, Math.hypot(dx, dy));
          const chase = 0.03 + bots.length * 0.002 + (curve - 1) * 0.01;
          bot.vx += (dx / len) * chase;
          bot.vy += (dy / len) * chase;
          bot.vx *= 0.995;
          bot.vy *= 0.995;
          bot.x += bot.vx;
          bot.y += bot.vy;

          if (bot.x < bot.r || bot.x > canvas.width - bot.r) bot.vx *= -1;
          if (bot.y < bot.r || bot.y > canvas.height - bot.r) bot.vy *= -1;

          const hit = Math.hypot(player.x - bot.x, player.y - bot.y) < player.r + bot.r;
          if (hit) {
            damage();
          }
        });

        cells = cells.filter((cell) => {
          if (Math.hypot(player.x - cell.x, player.y - cell.y) < player.r + cell.r + 2) {
            score += 30;
            return false;
          }
          return true;
        });

        score += 1;
        info.textContent = `Score: ${score} | Time: ${Math.floor(ticks / 60)}s | Lives: ${lives}`;
      }

      function drawHex(x, y, r, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        for (let i = 0; i < 6; i += 1) {
          const a = (Math.PI / 3) * i + Math.PI / 6;
          const px = x + Math.cos(a) * r;
          const py = y + Math.sin(a) * r;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
      }

      function draw() {
        const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        bg.addColorStop(0, "#061228");
        bg.addColorStop(1, "#071a34");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "rgba(0,229,255,0.12)";
        for (let y = 24; y < canvas.height; y += 28) {
          for (let x = 20; x < canvas.width; x += 28) {
            drawHex(x + (y % 56 ? 14 : 0), y, 10, "rgba(0,0,0,0)");
            ctx.stroke();
          }
        }

        cells.forEach((cell) => drawHex(cell.x, cell.y, cell.r, "#00e5ff"));
        bots.forEach((bot) => drawHex(bot.x, bot.y, bot.r, "#ff2060"));
        drawHex(player.x, player.y, player.r, "#00ff88");

        if (over) {
          ctx.fillStyle = "rgba(0,0,0,0.45)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#ffffff";
          ctx.textAlign = "center";
          ctx.font = "700 24px Orbitron";
          ctx.fillText("System Overrun", canvas.width / 2, canvas.height / 2 - 8);
          ctx.font = "500 14px Rajdhani";
          ctx.fillText("Press Restart to try again", canvas.width / 2, canvas.height / 2 + 18);
        }
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener("keydown", (event) => {
        const k = event.key.toLowerCase();
        if (k === "arrowup" || k === "w") keys.up = true;
        if (k === "arrowdown" || k === "s") keys.down = true;
        if (k === "arrowleft" || k === "a") keys.left = true;
        if (k === "arrowright" || k === "d") keys.right = true;
      });

      window.addEventListener("keyup", (event) => {
        const k = event.key.toLowerCase();
        if (k === "arrowup" || k === "w") keys.up = false;
        if (k === "arrowdown" || k === "s") keys.down = false;
        if (k === "arrowleft" || k === "a") keys.left = false;
        if (k === "arrowright" || k === "d") keys.right = false;
      });

      restartButton.addEventListener("click", reset);

      async function loadConfig() {
        try {
          const response = await fetch("/api/runtime-config.php");
          const data = await response.json();
          const gameCfg = data.games?.hexavoid || {};
          Object.assign(cfg, gameCfg);
        } catch {
          // Use defaults if runtime config is unavailable.
        }
      }

      (async () => {
        leaderboard.refresh();
        await loadConfig();
        reset();
        loop();
      })();
    </script>
  </body>
</html>
