<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Duel | webgames.lol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .ttt-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.65rem;
        width: min(360px, 100%);
      }

      .ttt-cell {
        min-height: 90px;
        border: 2px solid var(--border);
        border-radius: 12px;
        background: rgba(0, 229, 255, 0.05);
        color: #fff;
        font-size: 2rem;
        font-family: "Share Tech Mono", monospace;
        cursor: pointer;
      }

      .ttt-cell.selected {
        border-color: var(--cyan);
        box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.25);
      }

      .ttt-score {
        margin-top: 1rem;
        font-family: "Share Tech Mono", monospace;
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <header>
        <h1>Grid Duel</h1>
        <p>Grid duel mode. Play X vs O and keep score over rounds. Keyboard: 1-9 or arrows + Enter.</p>
        <a class="back-link" href="/">Back to webgames.lol</a>
      </header>

      <section class="panel">
        <p id="tttInfo">Turn: X</p>
        <div class="ttt-grid" id="tttGrid"></div>
        <p class="ttt-score" id="tttScore">X wins: 0 | O wins: 0 | Draws: 0</p>
        <div class="controls">
          <button id="tttRestart">New Round</button>
          <button id="tttReset">Reset Score</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Leaderboard</h2>
          <p>Top Grid Duel win totals (X side).</p>
        </div>
        <p id="lbStatus" class="status">Loading leaderboard...</p>
        <ol id="lbList" class="leaderboard-list"></ol>
      </section>
    </main>

    <script src="progression.js"></script>
    <script src="leaderboard.js"></script>
    <script>
      const grid = document.getElementById("tttGrid");
      const info = document.getElementById("tttInfo");
      const scoreEl = document.getElementById("tttScore");
      const restartButton = document.getElementById("tttRestart");
      const resetButton = document.getElementById("tttReset");
      const leaderboard = createLeaderboardController({ game: "tictactoe", listId: "lbList", statusId: "lbStatus" });
      const progression = createProgressionCurve({ start: 1, end: 2.4, warmup: 120, duration: 3200 });

      let board;
      let turn;
      let ended;
      let score;
      let selectedCell = 0;

      const wins = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6]
      ];

      function resetRound() {
        board = ["", "", "", "", "", "", "", "", ""];
        turn = "X";
        ended = false;
        selectedCell = 0;
        leaderboard.resetRound();
        render();
        info.textContent = "Turn: X";
      }

      function resetScore() {
        score = { X: 0, O: 0, draws: 0 };
        updateScore();
        resetRound();
      }

      function updateScore() {
        scoreEl.textContent = `X wins: ${score.X} | O wins: ${score.O} | Draws: ${score.draws}`;
      }

      function winner() {
        for (const [a, b, c] of wins) {
          if (board[a] && board[a] === board[b] && board[b] === board[c]) {
            return board[a];
          }
        }
        return "";
      }

      function bestMoveFor(symbol) {
        const options = board
          .map((cell, index) => (cell === "" ? index : -1))
          .filter((index) => index >= 0);
        for (const idx of options) {
          board[idx] = symbol;
          const w = winner();
          board[idx] = "";
          if (w === symbol) return idx;
        }
        return -1;
      }

      function pickAIMove() {
        const rounds = score.X + score.O + score.draws;
        const curve = progression.at(rounds * 240);
        const smartChance = Math.min(0.95, 0.45 + (curve - 1) * 0.35);
        const options = board
          .map((cell, index) => (cell === "" ? index : -1))
          .filter((index) => index >= 0);
        if (!options.length) {
          return -1;
        }

        if (Math.random() < smartChance) {
          const winNow = bestMoveFor("O");
          if (winNow >= 0) return winNow;
          const blockNow = bestMoveFor("X");
          if (blockNow >= 0) return blockNow;
          if (board[4] === "") return 4;
        }

        return options[Math.floor(Math.random() * options.length)];
      }

      function maybeAIMove() {
        if (ended || turn !== "O") {
          return;
        }

        const delay = Math.max(170, 520 - (score.X + score.O + score.draws) * 20);
        setTimeout(() => {
          if (ended || turn !== "O") {
            return;
          }
          const move = pickAIMove();
          if (move >= 0) {
            clickCell(move);
          }
        }, delay);
      }

      function clickCell(index) {
        if (ended || board[index]) {
          return;
        }

        board[index] = turn;
        const whoWon = winner();

        if (whoWon) {
          ended = true;
          score[whoWon] += 1;
          info.textContent = `${whoWon} wins this round`;
          if (whoWon === "X") {
            leaderboard.submit(score.X);
          }
          updateScore();
          render();
          return;
        }

        if (board.every((cell) => cell !== "")) {
          ended = true;
          score.draws += 1;
          info.textContent = "Draw round";
          updateScore();
          render();
          return;
        }

        turn = turn === "X" ? "O" : "X";
        info.textContent = `Turn: ${turn}`;
        render();
        maybeAIMove();
      }

      function render() {
        grid.innerHTML = "";
        board.forEach((cell, index) => {
          const button = document.createElement("button");
          button.className = "ttt-cell";
          if (index === selectedCell) {
            button.classList.add("selected");
          }
          button.textContent = cell || "";
          button.addEventListener("click", () => clickCell(index));
          grid.appendChild(button);
        });
      }

      function moveSelection(direction) {
        const row = Math.floor(selectedCell / 3);
        const col = selectedCell % 3;

        if (direction === "up") selectedCell = ((row + 2) % 3) * 3 + col;
        if (direction === "down") selectedCell = ((row + 1) % 3) * 3 + col;
        if (direction === "left") selectedCell = row * 3 + ((col + 2) % 3);
        if (direction === "right") selectedCell = row * 3 + ((col + 1) % 3);

        render();
      }

      window.addEventListener("keydown", (event) => {
        if (event.key >= "1" && event.key <= "9") {
          event.preventDefault();
          clickCell(Number(event.key) - 1);
          return;
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          moveSelection("up");
        }
        if (event.key === "ArrowDown") {
          event.preventDefault();
          moveSelection("down");
        }
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          moveSelection("left");
        }
        if (event.key === "ArrowRight") {
          event.preventDefault();
          moveSelection("right");
        }
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          clickCell(selectedCell);
        }
      });

      restartButton.addEventListener("click", resetRound);
      resetButton.addEventListener("click", resetScore);

      leaderboard.refresh();
      resetScore();
    </script>
  </body>
</html>
