<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meteor Drift | webgames.lol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header>
        <h1>Meteor Drift</h1>
        <p>Space survival combat. WASD or Arrows move, Space fires, Shift dashes.</p>
        <a class="back-link" href="/">Back to webgames.lol</a>
      </header>

      <section class="panel">
        <p id="meteorInfo">Score: 0 | Hull: 100%</p>
        <div class="canvas-wrap">
          <canvas id="meteorCanvas" width="520" height="620" aria-label="Meteor Drift game"></canvas>
        </div>
        <div class="controls">
          <button id="meteorRestart">Restart</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Leaderboard</h2>
          <p>Top meteor drift survival scores.</p>
        </div>
        <p id="lbStatus" class="status">Loading leaderboard...</p>
        <ol id="lbList" class="leaderboard-list"></ol>
      </section>
    </main>

    <script src="progression.js"></script>
    <script src="leaderboard.js"></script>
    <script>
      const canvas = document.getElementById("meteorCanvas");
      const ctx = canvas.getContext("2d");
      const info = document.getElementById("meteorInfo");
      const restartBtn = document.getElementById("meteorRestart");
      const leaderboard = createLeaderboardController({ game: "meteor", listId: "lbList", statusId: "lbStatus" });
      const progression = createProgressionCurve({ start: 1, end: 2.4, warmup: 120, duration: 3200 });

      const cfg = {
        startingHull: 120,
        baseSpeed: 1.7,
        spawnBaseline: 44,
        shipSpeed: 5.3
      };

      let ship;
      let rocks;
      let bullets;
      let particles;
      let keys;
      let score;
      let ended;
      let spawn;
      let speed;
      let hull;
      let shootCd;
      let dashCd;
      let invuln;
      let wave;
      let frameCount;
      let graceFrames;

      function restart() {
        ship = { x: 250, y: 560, w: 26, h: 26, speed: cfg.shipSpeed };
        rocks = [];
        bullets = [];
        particles = [];
        keys = { left: false, right: false, up: false, down: false, shoot: false };
        score = 0;
        ended = false;
        spawn = 0;
        speed = cfg.baseSpeed;
        hull = Math.max(40, Math.floor(cfg.startingHull));
        shootCd = 0;
        dashCd = 0;
        invuln = 60;
        wave = 1;
        frameCount = 0;
        graceFrames = 240;
        leaderboard.resetRound();
      }

      function hit(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function burst(x, y, color, amount = 12) {
        for (let i = 0; i < amount; i += 1) {
          particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 3.5,
            vy: (Math.random() - 0.5) * 3.5,
            life: 20 + Math.random() * 24,
            color
          });
        }
      }

      function addRock() {
        const size = 16 + Math.random() * 42;
        const hp = Math.ceil(size / 20);
        rocks.push({
          x: Math.random() * (canvas.width - size),
          y: -size,
          w: size,
          h: size,
          hp,
          dy: speed + Math.random() * 1.8,
          dx: (Math.random() - 0.5) * (1 + wave * 0.08)
        });
      }

      function updateShip() {
        const currentSpeed = keys.down ? ship.speed * 0.7 : ship.speed;
        if (keys.left) ship.x -= currentSpeed;
        if (keys.right) ship.x += currentSpeed;
        if (keys.up) ship.y -= currentSpeed;
        if (keys.down) ship.y += currentSpeed;

        ship.x = Math.max(0, Math.min(canvas.width - ship.w, ship.x));
        ship.y = Math.max(0, Math.min(canvas.height - ship.h, ship.y));

        if (keys.shoot && shootCd === 0) {
          bullets.push({ x: ship.x + ship.w / 2 - 2, y: ship.y - 8, w: 4, h: 12, dy: -8 });
          shootCd = 7;
        }

        shootCd = Math.max(0, shootCd - 1);
        dashCd = Math.max(0, dashCd - 1);
        invuln = Math.max(0, invuln - 1);
      }

      function updateBullets() {
        bullets.forEach((bullet) => {
          bullet.y += bullet.dy;
        });
        bullets = bullets.filter((bullet) => bullet.y > -24);
      }

      function updateRocks() {
        rocks.forEach((rock) => {
          rock.y += rock.dy;
          rock.x += rock.dx;

          if (rock.x < 0 || rock.x + rock.w > canvas.width) {
            rock.dx *= -1;
          }

          if (!ended && invuln === 0 && hit(ship, rock)) {
            hull -= rock.hp * 11;
            invuln = 38;
            burst(ship.x + ship.w / 2, ship.y + ship.h / 2, "#ff4d6d", 18);
            rock.y = canvas.height + 200;
            if (hull <= 0) {
              hull = 0;
              ended = true;
              leaderboard.submit(Math.floor(score));
            }
          }
        });

        for (let i = rocks.length - 1; i >= 0; i -= 1) {
          const rock = rocks[i];
          for (let j = bullets.length - 1; j >= 0; j -= 1) {
            if (hit(rock, bullets[j])) {
              rock.hp -= 1;
              bullets.splice(j, 1);
              burst(rock.x + rock.w / 2, rock.y + rock.h / 2, "#ffd166", 6);
              if (rock.hp <= 0) {
                score += 22;
                burst(rock.x + rock.w / 2, rock.y + rock.h / 2, "#00e5ff", 14);
                rocks.splice(i, 1);
              }
              break;
            }
          }
        }

        rocks = rocks.filter((rock) => rock.y < canvas.height + 90);
      }

      function updateParticles() {
        particles.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.98;
          p.vy *= 0.98;
          p.life -= 1;
        });
        particles = particles.filter((p) => p.life > 0);
      }

      function update() {
        if (ended) {
          info.textContent = `Score: ${Math.floor(score)} | Hull: 0% | Mission failed`;
          updateParticles();
          return;
        }

        frameCount += 1;

        updateShip();

        spawn += 1;
        const curve = progression.at(frameCount - graceFrames);
        const difficulty = Math.min(1.25, Math.max(0, (curve - 1) / 1.25));
        const spawnRate = Math.max(12, Math.floor(cfg.spawnBaseline - difficulty * 24 - wave * 0.95));
        if (frameCount > 80 && spawn >= spawnRate) {
          spawn = 0;
          addRock();
        }

        updateBullets();
        updateRocks();
        updateParticles();

        score += 0.13;
  speed = Math.min(7.8, cfg.baseSpeed + score * 0.0058 + difficulty * 1.05);
        wave = Math.max(1, Math.floor(score / 180) + 1);

        const onboarding = frameCount < graceFrames ? " | Stabilizing" : "";
        info.textContent = `Score: ${Math.floor(score)} | Hull: ${Math.floor(hull)}% | Wave: ${wave}${onboarding}`;
      }

      function drawStars() {
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, "#050a12");
        grad.addColorStop(1, "#02060d");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < 95; i += 1) {
          const x = (i * 57 + Date.now() * 0.02) % canvas.width;
          const y = (i * 91 + Date.now() * 0.09) % canvas.height;
          ctx.fillStyle = "rgba(200,230,255,0.6)";
          ctx.fillRect(x, y, 2, 2);
        }
      }

      function drawShip() {
        ctx.fillStyle = invuln > 0 ? "#ffe600" : "#00e5ff";
        ctx.beginPath();
        ctx.moveTo(ship.x + ship.w / 2, ship.y - 3);
        ctx.lineTo(ship.x - 2, ship.y + ship.h + 3);
        ctx.lineTo(ship.x + ship.w + 2, ship.y + ship.h + 3);
        ctx.closePath();
        ctx.fill();
      }

      function drawRocks() {
        rocks.forEach((rock) => {
          ctx.fillStyle = "#ff7f39";
          ctx.beginPath();
          ctx.ellipse(rock.x + rock.w / 2, rock.y + rock.h / 2, rock.w / 2, rock.h / 2, 0, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawBullets() {
        ctx.fillStyle = "#6dffbf";
        bullets.forEach((bullet) => {
          ctx.fillRect(bullet.x, bullet.y, bullet.w, bullet.h);
        });
      }

      function drawParticles() {
        particles.forEach((p) => {
          ctx.fillStyle = p.color;
          ctx.globalAlpha = Math.max(0, p.life / 40);
          ctx.beginPath();
          ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        });
      }

      function drawHud() {
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.fillRect(12, 12, 145, 14);
        ctx.fillRect(12, 30, 145, 14);

        ctx.fillStyle = "#ff5e6c";
        ctx.fillRect(12, 12, (hull / 100) * 145, 14);

        const dashCharge = ((60 - dashCd) / 60) * 145;
        ctx.fillStyle = "#00e5ff";
        ctx.fillRect(12, 30, Math.max(0, dashCharge), 14);

        ctx.fillStyle = "#d7ebff";
        ctx.font = "700 11px Share Tech Mono";
        ctx.textAlign = "left";
        ctx.fillText("Hull", 161, 23);
        ctx.fillText("Dash", 161, 41);
      }

      function draw() {
        drawStars();
        drawRocks();
        drawBullets();
        drawShip();
        drawParticles();
        drawHud();

        if (ended) {
          ctx.fillStyle = "rgba(0,0,0,0.45)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#cfe8ff";
          ctx.font = "700 26px Orbitron";
          ctx.textAlign = "center";
          ctx.fillText("MISSION FAILED", canvas.width / 2, canvas.height / 2 - 8);
          ctx.font = "500 15px Rajdhani";
          ctx.fillText("Press Restart", canvas.width / 2, canvas.height / 2 + 20);
        }
      }

      function frame() {
        update();
        draw();
        requestAnimationFrame(frame);
      }

      function dash() {
        if (dashCd > 0 || ended) {
          return;
        }

        const dx = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
        const dy = (keys.down ? 1 : 0) - (keys.up ? 1 : 0);

        const vx = dx === 0 && dy === 0 ? 0 : dx * 55;
        const vy = dx === 0 && dy === 0 ? -55 : dy * 55;

        ship.x = Math.max(0, Math.min(canvas.width - ship.w, ship.x + vx));
        ship.y = Math.max(0, Math.min(canvas.height - ship.h, ship.y + vy));
        invuln = 22;
        dashCd = 60;
        burst(ship.x + ship.w / 2, ship.y + ship.h / 2, "#00e5ff", 20);
      }

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (event.key === "ArrowLeft" || key === "a") keys.left = true;
        if (event.key === "ArrowRight" || key === "d") keys.right = true;
        if (event.key === "ArrowUp" || key === "w") keys.up = true;
        if (event.key === "ArrowDown" || key === "s") keys.down = true;
        if (event.key === " " || event.code === "Space") {
          keys.shoot = true;
          event.preventDefault();
        }
        if (event.key === "Shift") {
          dash();
        }
      });

      window.addEventListener("keyup", (event) => {
        const key = event.key.toLowerCase();
        if (event.key === "ArrowLeft" || key === "a") keys.left = false;
        if (event.key === "ArrowRight" || key === "d") keys.right = false;
        if (event.key === "ArrowUp" || key === "w") keys.up = false;
        if (event.key === "ArrowDown" || key === "s") keys.down = false;
        if (event.key === " " || event.code === "Space") keys.shoot = false;
      });

      restartBtn.addEventListener("click", restart);

      async function loadConfig() {
        try {
          const response = await fetch("/api/runtime-config.php");
          const data = await response.json();
          Object.assign(cfg, data.games?.meteor || {});
        } catch {
          // Use defaults when runtime config is unavailable.
        }
      }

      (async () => {
        leaderboard.refresh();
        await loadConfig();
        restart();
        frame();
      })();
    </script>
  </body>
</html>
