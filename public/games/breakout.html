<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brick Blitz | webgames.lol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header>
        <h1>Brick Blitz</h1>
        <p>Brick-smashing arcade run. Move the paddle and clear the wall.</p>
        <a class="back-link" href="/">Back to webgames.lol</a>
      </header>

      <section class="panel">
        <p id="breakoutInfo">Score: 0 | Lives: 3</p>
        <div class="canvas-wrap">
          <canvas id="breakoutCanvas" width="760" height="430" aria-label="Breakout game"></canvas>
        </div>
        <div class="controls">
          <button id="breakoutRestart">Restart</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Leaderboard</h2>
          <p>Top brick blitz scores.</p>
        </div>
        <p id="lbStatus" class="status">Loading leaderboard...</p>
        <ol id="lbList" class="leaderboard-list"></ol>
      </section>
    </main>

    <script src="progression.js"></script>
    <script src="leaderboard.js"></script>
    <script>
      const canvas = document.getElementById("breakoutCanvas");
      const ctx = canvas.getContext("2d");
      const info = document.getElementById("breakoutInfo");
      const restartButton = document.getElementById("breakoutRestart");
      const leaderboard = createLeaderboardController({ game: "breakout", listId: "lbList", statusId: "lbStatus" });
      const progression = createProgressionCurve({ start: 1, end: 2.4, warmup: 120, duration: 3200 });

      const paddle = { x: 320, y: 395, w: 120, h: 14, speed: 8 };
      const ball = { x: 380, y: 280, r: 8, dx: 4, dy: -4 };
      const brickRows = 6;
      const brickCols = 10;
      const brickW = 68;
      const brickH = 20;
      const brickGap = 6;
      const offsetX = 16;
      const offsetY = 42;

      let score = 0;
      let lives = 3;
      let playing = true;
      let leftPressed = false;
      let rightPressed = false;
      let bricks = [];

      function resetBricks() {
        bricks = [];
        for (let row = 0; row < brickRows; row += 1) {
          for (let col = 0; col < brickCols; col += 1) {
            bricks.push({
              x: offsetX + col * (brickW + brickGap),
              y: offsetY + row * (brickH + brickGap),
              hp: 1,
              color: `hsl(${20 + row * 25}, 85%, ${55 - row * 4}%)`
            });
          }
        }
      }

      function restart() {
        score = 0;
        lives = 3;
        playing = true;
        paddle.x = canvas.width / 2 - paddle.w / 2;
        ball.x = canvas.width / 2;
        ball.y = 280;
        ball.dx = 4;
        ball.dy = -4;
        leaderboard.resetRound();
        resetBricks();
      }

      function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        grad.addColorStop(0, "#0d2235");
        grad.addColorStop(1, "#173c5c");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      function drawBricks() {
        bricks.forEach((brick) => {
          if (brick.hp <= 0) {
            return;
          }
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brickW, brickH);
        });
      }

      function drawPaddle() {
        ctx.fillStyle = "#f7c244";
        ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
      }

      function drawBall() {
        ctx.fillStyle = "#f6f4ef";
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fill();
      }

      function handleCollisions() {
        bricks.forEach((brick) => {
          if (brick.hp <= 0) {
            return;
          }

          const overlapX = ball.x > brick.x && ball.x < brick.x + brickW;
          const overlapY = ball.y - ball.r < brick.y + brickH && ball.y + ball.r > brick.y;

          if (overlapX && overlapY) {
            brick.hp = 0;
            score += 10;
            ball.dy *= -1;
          }
        });

        if (ball.x - ball.r <= 0 || ball.x + ball.r >= canvas.width) {
          ball.dx *= -1;
        }

        if (ball.y - ball.r <= 0) {
          ball.dy *= -1;
        }

        const hitPaddle =
          ball.y + ball.r >= paddle.y &&
          ball.x >= paddle.x &&
          ball.x <= paddle.x + paddle.w &&
          ball.y < paddle.y + paddle.h;

        if (hitPaddle) {
          const impact = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
          ball.dx = 5 * impact;
          ball.dy = -Math.abs(ball.dy);
        }

        if (ball.y - ball.r > canvas.height) {
          lives -= 1;
          if (lives <= 0) {
            playing = false;
            leaderboard.submit(score);
            return;
          }

          ball.x = canvas.width / 2;
          ball.y = 280;
          ball.dx = 4;
          ball.dy = -4;
          paddle.x = canvas.width / 2 - paddle.w / 2;
        }

        if (bricks.every((brick) => brick.hp <= 0)) {
          playing = false;
          leaderboard.submit(score);
          info.textContent = `Score: ${score} | You cleared the wall!`;
        }
      }

      function update() {
        if (!playing) {
          return;
        }

        const curve = progression.at(score * 18);
        paddle.w = Math.max(84, 120 - Math.floor((curve - 1) * 18));
        paddle.speed = 8 + (curve - 1) * 0.8;

        if (leftPressed) {
          paddle.x = Math.max(0, paddle.x - paddle.speed);
        }
        if (rightPressed) {
          paddle.x = Math.min(canvas.width - paddle.w, paddle.x + paddle.speed);
        }

        ball.x += ball.dx;
        ball.y += ball.dy;
        const cap = 4.8 + (curve - 1) * 1.7;
        ball.dx = Math.max(-cap, Math.min(cap, ball.dx));
        ball.dy = Math.max(-cap, Math.min(cap, ball.dy));

        handleCollisions();

        info.textContent = `Score: ${score} | Lives: ${lives}`;
      }

      function draw() {
        drawBackground();
        drawBricks();
        drawPaddle();
        drawBall();
      }

      function frame() {
        update();
        draw();
        requestAnimationFrame(frame);
      }

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") {
          leftPressed = true;
        }
        if (event.key === "ArrowRight") {
          rightPressed = true;
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.key === "ArrowLeft") {
          leftPressed = false;
        }
        if (event.key === "ArrowRight") {
          rightPressed = false;
        }
      });

      canvas.addEventListener("mousemove", (event) => {
        const rect = canvas.getBoundingClientRect();
        const relativeX = ((event.clientX - rect.left) / rect.width) * canvas.width;
        paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, relativeX - paddle.w / 2));
      });

      restartButton.addEventListener("click", restart);

      leaderboard.refresh();
      restart();
      frame();
    </script>
  </body>
</html>
